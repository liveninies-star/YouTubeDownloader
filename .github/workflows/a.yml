name: Create and Commit Zip File to Repo

on:
  workflow_dispatch:  # Run this manually from Actions tab

jobs:
  create-and-commit-zip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Create a test zip file
        run: |
          # Create a folder to hold the zip
          mkdir -p download-test
          
          # Create a sample text file
          echo "This is a test file for the GitHub Android app" > download-test/sample.txt
          
          # Create the zip file
          cd download-test
          zip -r test-file.zip sample.txt
          cd ..
          
          # Remove the original text file (keep only the zip)
          rm download-test/sample.txt
          
          # Show what was created
          ls -la download-test/
      
      - name: Commit and push the zip file to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download-test/test-file.zip
          git commit -m "Add test zip file for Android app download testing" || echo "No changes to commit"
          git push